worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    upstream backend {
        # FastAPI contact backend — reached over the compose network by
        # service name (no host port, avoids clashing with chattag_backend_dev).
        server portfolio_backend_dev:8000;
    }

    upstream frontend {
        # Nuxt dev server (app service) over the compose network — kept for HMR
        server app:3000;
    }

    server {
        listen 80;

        # API endpoints -> FastAPI backend
        location /api/ {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        # Everything else -> Nuxt dev server (with HMR websocket upgrade)
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }
    }
}
