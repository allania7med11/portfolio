services:
  portfolio_backend:
    container_name: portfolio_backend
    image: ghcr.io/allania7med11/portfolio_backend:latest
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: production
    env_file: ./backend/.env
    environment:
      - ENVIRONMENT=prod
    restart: always

  portfolio_nginx:
    container_name: portfolio_nginx
    image: ghcr.io/allania7med11/portfolio_nginx:latest
    build:
      context: .
      dockerfile: nginx/Dockerfile
    ports:
      - "4020:80"  # host nginx (TLS) reverse-proxies to this
    depends_on:
      - portfolio_backend
    restart: always
